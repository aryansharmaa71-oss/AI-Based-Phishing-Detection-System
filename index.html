<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Phishing Detection System</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
            text-align: center;
        }
        h2 { color: #333; margin-bottom: 24px; }
        input[type="text"] {
            width: 100%;
            padding: 12px 20px;
            margin: 8px 0;
            box-sizing: border-box;
            border: 2px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
            transition: 0.3s;
        }
        input[type="text"]:focus { border-color: #4CAF50; outline: none; }
        button {
            width: 100%;
            background-color: #4CAF50;
            color: white;
            padding: 14px 20px;
            margin: 15px 0;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }
        button:hover { background-color: #45a049; }
        .result-box {
            margin-top: 25px;
            padding: 15px;
            border-radius: 8px;
            display: none;
            font-weight: bold;
        }
        .safe { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .phishing { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .loading { color: #666; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <h2>AI Phishing Detector</h2>
    <p style="color: #666;">Enter a URL below to check if it's safe or a phishing trap.</p>
    
    <input type="text" id="urlInput" placeholder="https://example.com/login" required>
    <button onclick="analyzeURL()">Analyze URL</button>

    <div id="result" class="result-box"></div>
</div>

<script>
    async function analyzeURL() {
        const urlInput = document.getElementById('urlInput').value.trim();
        const resultDiv = document.getElementById('result');
        
        if (!urlInput) {
            alert("Please enter a valid URL.");
            return;
        }

        // Show loading status
        resultDiv.style.display = 'block';
        resultDiv.className = 'result-box loading';
        resultDiv.innerText = "Analyzing URL patterns with AI...";

        try {
            const response = await fetch('http://127.0.0.1:8000/predict', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url: urlInput })
            });

            if (!response.ok) throw new Error("API Server error");

            const data = await response.json();

            // Render result based on backend response
            if (data.is_phishing) {
                resultDiv.className = 'result-box phishing';
                resultDiv.innerHTML = `🚨 SUSPECTED PHISHING!<br><span style="font-size:14px; font-weight:normal;">Phishing Risk Score: ${data.confidence_score}%</span>`;
            } else {
                resultDiv.className = 'result-box safe';
                resultDiv.innerHTML = `✅ URL APPEARS SAFE<br><span style="font-size:14px; font-weight:normal;">Phishing Risk Score: ${data.confidence_score}%</span>`;
            }
        } catch (error) {
            resultDiv.className = 'result-box phishing';
            resultDiv.innerText = "Error: Could not connect to the backend server.";
        }
    }
</script>

</body>
</html>
